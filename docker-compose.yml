# Customer Intelligence Agent — local orchestration.
# Supabase (Postgres, Auth, Storage, pgvector) is hosted in the cloud; this file
# runs the app tier plus the local AI dependencies (Ollama, Neo4j, optional Redis).
services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12

  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"   # browser
      - "7687:7687"   # bolt
    environment:
      NEO4J_AUTH: "${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-please-change-me}"
      NEO4J_server_memory_pagecache_size: "512M"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    profiles: ["jobs"]   # only started with: docker compose --profile jobs up

  backend:
    build: ./backend
    env_file: .env
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      NEO4J_URI: bolt://neo4j:7687
    ports:
      - "8000:8000"
    depends_on:
      ollama:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev

volumes:
  ollama_data:
  neo4j_data:
