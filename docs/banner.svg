<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d9a441"/>
      <stop offset="1" stop-color="#a06f24"/>
    </linearGradient>
    <linearGradient id="fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#b68235" stop-opacity="0.0"/>
      <stop offset="0.5" stop-color="#b68235" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#b68235" stop-opacity="0.0"/>
    </linearGradient>
  </defs>

  <!-- paper -->
  <rect width="1200" height="320" fill="#f3f2f2"/>
  <rect width="1200" height="320" fill="none" stroke="#dfdad3" stroke-width="1"/>

  <!-- concentric rings, top-right, gentle breathing -->
  <g transform="translate(1010,90)" fill="none" stroke="#e4c99a" opacity="0.55">
    <circle r="40"><animate attributeName="r" values="40;46;40" dur="6s" repeatCount="indefinite"/></circle>
    <circle r="70"><animate attributeName="r" values="70;76;70" dur="6s" begin="0.4s" repeatCount="indefinite"/></circle>
    <circle r="100"><animate attributeName="r" values="100;106;100" dur="6s" begin="0.8s" repeatCount="indefinite"/></circle>
  </g>

  <!-- kicker -->
  <text x="70" y="96" fill="#a06f24" font-size="15" letter-spacing="4" font-family="Georgia, serif">C A L I S P E C  ·  A I</text>

  <!-- title -->
  <text x="68" y="168" fill="#201f1d" font-size="62" font-weight="600" letter-spacing="-1">Customer Intelligence Agent</text>

  <!-- animated underline -->
  <rect x="70" y="188" height="3" fill="url(#fade)" rx="1.5">
    <animate attributeName="width" from="0" to="520" dur="1.1s" fill="freeze"/>
  </rect>

  <!-- subtitle -->
  <text x="70" y="232" fill="#5c584f" font-size="21">AI summaries · explainable risk · 360 timeline · RAG chat · multi-agent briefs</text>

  <!-- memory-graph node network -->
  <g stroke="#c99a4a" stroke-width="1.4" opacity="0.9">
    <line x1="70" y1="278" x2="150" y2="262"/>
    <line x1="150" y1="262" x2="235" y2="286"/>
    <line x1="235" y1="286" x2="330" y2="266"/>
    <line x1="330" y1="266" x2="430" y2="284"/>
    <line x1="430" y1="284" x2="520" y2="268"/>
  </g>
  <g fill="url(#gold)">
    <circle cx="70" cy="278" r="6"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.4s" repeatCount="indefinite"/></circle>
    <circle cx="150" cy="262" r="6"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.4s" begin="0.3s" repeatCount="indefinite"/></circle>
    <circle cx="235" cy="286" r="6"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.4s" begin="0.6s" repeatCount="indefinite"/></circle>
    <circle cx="330" cy="266" r="6"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.4s" begin="0.9s" repeatCount="indefinite"/></circle>
    <circle cx="430" cy="284" r="6"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.4s" begin="1.2s" repeatCount="indefinite"/></circle>
    <circle cx="520" cy="268" r="6"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.4s" begin="1.5s" repeatCount="indefinite"/></circle>
  </g>

  <!-- pulsing core by the rings -->
  <circle cx="1010" cy="90" r="14" fill="url(#gold)">
    <animate attributeName="r" values="14;18;14" dur="3s" repeatCount="indefinite"/>
  </circle>
</svg>
